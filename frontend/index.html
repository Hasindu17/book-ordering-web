<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Marketplace</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background: #f4f7fb;
        }

        nav {
            background: #111827;
            color: white;
            padding: 20px 50px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            font-size: 28px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul li {
            cursor: pointer;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(
                to right,
                #4f46e5,
                #7c3aed
            );

            color: white;
        }

        .hero h2 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
        }

        .search-box {
            width: 90%;
            max-width: 500px;
            margin: 30px auto;
        }

        .search-box input {

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 10px;

            font-size: 16px;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            margin: auto;
            padding-bottom: 50px;
        }

        .books-grid {

            display: grid;

            grid-template-columns: repeat(
                auto-fit,
                minmax(250px, 1fr)
            );

            gap: 25px;
        }

        .book-card {

            background: white;

            border-radius: 15px;

            padding: 20px;

            box-shadow: 0px 5px 15px rgba(0,0,0,0.08);

            transition: 0.3s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .category {

            display: inline-block;

            background: #ede9fe;

            color: #5b21b6;

            padding: 5px 10px;

            border-radius: 20px;

            font-size: 12px;

            margin-bottom: 10px;
        }

        .book-card h3 {
            margin-bottom: 10px;
        }

        .price {

            color: green;

            font-size: 20px;

            font-weight: bold;

            margin: 15px 0;
        }

        button {

            width: 100%;

            padding: 12px;

            background: #4f46e5;

            color: white;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            font-size: 15px;
        }

        button:hover {
            background: #4338ca;
        }

    </style>

</head>

<body>

    <nav>

        <h1>📚 Book Marketplace</h1>

        <ul>
            <li>Home</li>
            <li>Books</li>
            <li>Orders</li>
            <li>Dashboard</li>
        </ul>

    </nav>

    <section class="hero">

        <h2>Discover Your Next Favorite Book</h2>

        <p>
            Buy books from authors and sellers worldwide
        </p>

    </section>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Search books..."
            onkeyup="filterBooks()"
        >

    </div>

    <div class="container">

        <div
            class="books-grid"
            id="books-container"
        >

        </div>

    </div>

    <script>

        let allBooks = [];

        async function loadBooks() {

            const response = await fetch(
                "http://localhost:8001/books"
            );

            const books = await response.json();

            allBooks = books;

            displayBooks(books);
        }

        function displayBooks(books) {

            const container =
                document.getElementById(
                    "books-container"
                );

            container.innerHTML = "";

            books.forEach(book => {

                container.innerHTML += `

                    <div class="book-card">

                        <span class="category">
                            ${book.category}
                        </span>

                        <h3>${book.title}</h3>

                        <p>
                            <strong>Author:</strong>
                            ${book.author}
                        </p>

                        <p class="price">
                            Rs. ${book.price}
                        </p>

                        <button
                            onclick="orderBook(${book.id})"
                        >
                            Order Now
                        </button>

                    </div>
                `;
            });
        }

        function filterBooks() {

            const search =
                document
                    .getElementById("searchInput")
                    .value
                    .toLowerCase();

            const filtered = allBooks.filter(book =>
                book.title.toLowerCase().includes(search)
            );

            displayBooks(filtered);
        }

        async function orderBook(bookId) {

            const customerName =
                prompt("Enter your name");

            if (!customerName) return;

            const response = await fetch(
                "http://localhost:8002/orders",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        book_id: bookId,
                        quantity: 1,
                        customer_name: customerName
                    })
                }
            );

            const data = await response.json();

            alert(data.message);
        }

        loadBooks();

    </script>

</body>

</html>
