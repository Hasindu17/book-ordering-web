<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Marketplace</title>

    <style>

        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background: #24292e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 30px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
        }

        .book-card h3 {
            margin-top: 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

    </style>

</head>

<body>

    <header>
        <h1>📚 Book Marketplace</h1>
    </header>

    <div class="container">

        <div class="books-grid" id="books-container">

        </div>

    </div>

    <script>

        async function loadBooks() {

            const response = await fetch("http://localhost:8001/books");

            const books = await response.json();

            const container = document.getElementById("books-container");

            container.innerHTML = "";

            books.forEach(book => {

                container.innerHTML += `

                    <div class="book-card">

                        <h3>${book.title}</h3>

                        <p><strong>Author:</strong> ${book.author}</p>

                        <p><strong>Category:</strong> ${book.category}</p>

                        <p class="price">Rs. ${book.price}</p>

                        <button onclick="orderBook(${book.id})">
                            Order Now
                        </button>

                    </div>

                `;
            });
        }

        async function orderBook(bookId) {

            const customerName = prompt("Enter your name");

            if (!customerName) return;

            const response = await fetch(
                "http://localhost:8002/orders",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        book_id: bookId,
                        quantity: 1,
                        customer_name: customerName
                    })
                }
            );

            const data = await response.json();

            alert(data.message);
        }

        loadBooks();

    </script>

</body>

</html>
