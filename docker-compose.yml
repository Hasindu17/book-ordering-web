services:

  db:
    image: postgres:17

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book_marketplace

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  book-service:
    build: ./book-service

    container_name: book-service

    ports:
      - "8001:8001"

    depends_on:
      - db

  order-service:
    build: ./order-service

    container_name: order-service

    ports:
      - "8002:8002"

volumes:
  postgres_data: